apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: url-shortener
spec:
  ingressClassName: nginx
  rules:
    - host: url-shortener.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8000
