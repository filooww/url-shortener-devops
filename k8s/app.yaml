apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app 
    spec:
      containers:
      - name: app
        image: url-shortener:dev
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 8000
        envFrom:
          - configMapRef:
              name: app-config
          - secretRef:
              name: app-secret
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: url-shortener
spec:
  selector:
    app: app
  ports:
    - port: 8000
      targetPort: 8000
